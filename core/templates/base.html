<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>HopeHands Foundation</title>


<style>
    @keyframes pulse-zoom {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }
    .animate-pulse-zoom {
        animation: pulse-zoom 10s ease-in-out infinite;
    }

    @keyframes slideFromLeft {
        0% { transform: translateX(-100px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideFromRight {
        0% { transform: translateX(100px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
    }
    .animate-left { animation: slideFromLeft 1s ease-out forwards; }
    .animate-right { animation: slideFromRight 1s ease-out forwards; }

    /* Card 1 & 3 : Up to Down */
    @keyframes floatDown {
        0% {
            transform: translateY(-12px);
        }
        50% {
            transform: translateY(12px);
        }
        100% {
            transform: translateY(-12px);
        }
    }

    /* Card 2 & 4 : Down to Up */
    @keyframes floatUp {
        0% {
            transform: translateY(12px);
        }
        50% {
            transform: translateY(-12px);
        }
        100% {
            transform: translateY(12px);
        }
    }

    .float-down {
        animation: floatDown 4s ease-in-out infinite;
    }

    .float-up {
        animation: floatUp 4s ease-in-out infinite;
    }

    /* Image Animation */
    @keyframes zoomImage {
        0% {
            transform: scale(1);
        }
        50% {
            transform: scale(1.08);
        }
        100% {
            transform: scale(1);
        }
    }

    .animate-image {
        animation: zoomImage 6s ease-in-out infinite;
    }

    /* Hover Effects */
    .cause-card {
        transition: transform .5s ease, box-shadow .5s ease;
    }

    .cause-card:hover {
        transform: scale(1.05);
        box-shadow: 0 20px 40px rgba(0,0,0,.2);
    }

    .cause-card:hover img {
        transform: scale(1.12);
    }
</style>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>



<body class="flex flex-col min-h-screen">
    {% include 'components/navbar.html' %}
    

    <main class="w-[95%] mx-auto">
        {% block content %}
        {% endblock %}
    </main>


    {% include 'components/footer.html' %}
</body>
</html>
